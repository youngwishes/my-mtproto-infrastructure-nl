global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'mtproto-proxy'
    origin: 'balancer'

scrape_configs:
  - job_name: 'telemt-node1'
    static_configs:
      - targets: ['192.168.0.6:9090']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'telemt-node2'
    static_configs:
      - targets: ['192.168.0.7:9090']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'telemt-node3'
    static_configs:
      - targets: ['192.168.0.8:9090']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'haproxy'
    static_configs:
      - targets: [ 'haproxy:8404' ]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    metric_relabel_configs:
      - source_labels: [ __name__ ]
        regex: 'haproxy_.*'
        action: keep

remote_write:
  - url: "https://prometheus-prod-13-prod-us-east-0.grafana.net/api/prom/push"
    basic_auth:
      username: ${GRAFANA_USERNAME}
      password: ${GRAFANA_PASSWORD}
    write_relabel_configs:
      - source_labels: [__name__]
        regex: 'telemt_.*|haproxy_.*|node_.*'
        action: keep
